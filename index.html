<!doctype html>
<html lang="en">
  <head>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens in some environments (like AI Studio preview) where fetch is read-only
      (function() {
        const originalFetch = window.fetch;
        try {
          // Try to define a setter to prevent TypeError on assignment
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Ignored attempt to overwrite window.fetch'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If non-configurable, we must catch the error globally
          const suppressFetchError = (event) => {
            const msg = event.message || (event.reason && event.reason.message);
            if (msg && typeof msg === 'string' && msg.includes('fetch') && msg.includes('getter')) {
              if (event.preventDefault) event.preventDefault();
              if (event.stopImmediatePropagation) event.stopImmediatePropagation();
              return true;
            }
          };
          window.addEventListener('error', suppressFetchError, true);
          window.addEventListener('unhandledrejection', suppressFetchError, true);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsidian Ledger | Transactions</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=Obsidian&backgroundColor=ba9eff" />
  </head>

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
