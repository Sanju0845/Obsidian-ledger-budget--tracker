<!doctype html>
<html lang="en">
  <head>
    <script>
      // CRITICAL FIX: Suppress "Cannot set property fetch of #<Window> which has only a getter"
      // This error occurs in some sandboxed environments where window.fetch is read-only.
      (function() {
        const suppressFetchError = (event) => {
          const error = event.error || event.reason;
          const msg = (event.message || (error && error.message) || "").toLowerCase();
          if (msg.includes('fetch') && (msg.includes('getter') || msg.includes('read only') || msg.includes('setting property') || msg.includes('cannot set'))) {
            if (event.preventDefault) event.preventDefault();
            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
            return true;
          }
        };
        window.addEventListener('error', suppressFetchError, true);
        window.addEventListener('unhandledrejection', suppressFetchError, true);

        // Also use window.onerror for older browsers/environments
        const oldOnError = window.onerror;
        window.onerror = function(msg, url, line, col, error) {
          const m = (msg || "").toLowerCase();
          if (m.includes('fetch') && (m.includes('getter') || m.includes('read only') || m.includes('cannot set'))) {
            return true; // Suppress
          }
          if (oldOnError) return oldOnError.apply(this, arguments);
        };

        // Try to make fetch writable on window and globalThis
        [window, globalThis].forEach(target => {
          try {
            const originalFetch = target.fetch;
            if (originalFetch) {
              Object.defineProperty(target, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { /* No-op to prevent throw */ },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            // If defineProperty fails, the global listeners above will handle the error
          }
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Obsidian Ledger | Transactions</title>
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=Obsidian&backgroundColor=ba9eff" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
