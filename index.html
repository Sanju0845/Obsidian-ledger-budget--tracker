<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsidian Ledger | Transactions</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=Obsidian&backgroundColor=ba9eff" />
    <script>
      // Pre-emptively catch and ignore the fetch assignment error
      // This error often occurs when a library or extension tries to overwrite window.fetch
      // in an environment where it's read-only.
      (function() {
        const handler = (event) => {
          const message = event.message || (event.reason && event.reason.message);
          if (message && message.includes('Cannot set property fetch of #<Window>')) {
            console.warn('Caught and suppressed fetch assignment error:', message);
            if (event.preventDefault) event.preventDefault();
            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
            return true;
          }
        };
        window.addEventListener('error', handler, true);
        window.addEventListener('unhandledrejection', handler, true);
        window.onerror = (message) => {
          if (message && message.includes('Cannot set property fetch of #<Window>')) {
            console.warn('Caught and suppressed fetch assignment error (onerror):', message);
            return true;
          }
        };
        // Try to define a no-op setter for window.fetch if possible
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => { console.warn('Attempted to overwrite window.fetch - ignored'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If it's not configurable, we can't do much here, but the error listener should catch it.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
