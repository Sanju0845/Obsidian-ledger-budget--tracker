<!doctype html>
<html lang="en">
  <head>
    <script>
      // CRITICAL FIX: Suppress "Cannot set property fetch of #<Window> which has only a getter"
      // This error occurs in some sandboxed environments where window.fetch is read-only.
      (function() {
        // 1. Try to define a no-op setter to prevent the TypeError on assignment
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Ignored attempt to overwrite window.fetch'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // 2. If the property is non-configurable, we must catch the error globally
          // and prevent it from breaking the execution or showing up as uncaught.
          const handleFetchError = (event) => {
            const msg = event.message || (event.reason && event.reason.message) || "";
            if (typeof msg === 'string' && (msg.includes('fetch') || msg.includes('getter'))) {
              if (msg.includes('property fetch') || msg.includes('only a getter')) {
                if (event.preventDefault) event.preventDefault();
                if (event.stopImmediatePropagation) event.stopImmediatePropagation();
                return true;
              }
            }
          };
          window.addEventListener('error', handleFetchError, true);
          window.addEventListener('unhandledrejection', handleFetchError, true);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  </head>

  </body>
</html>
